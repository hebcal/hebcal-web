name: Node.js Build Without Lockfile

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: '26.x'
        cache: 'npm'
        cache-dependency-path: './package.json'
    - run: npm install
    - run: npm run build --if-present
    - run: npx --no-install --package=@hebcal/geo-sqlite make-test-dbs
    - run: npm test
